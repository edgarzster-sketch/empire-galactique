<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Empire Galactique</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#02030a;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;}
  #jeu{position:fixed;inset:0;}
  canvas{display:block;cursor:grab;}
  #connexion{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,#0a1228,#02030a);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;}
  #connexion h1{font-size:clamp(28px,6vw,46px);letter-spacing:3px;margin-bottom:8px;background:linear-gradient(90deg,#9bd5d0,#9bb8ff,#ffb0d8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  #connexion p{color:#8a97b5;margin-bottom:30px;font-size:14px;}
  #connexion input{width:280px;max-width:80vw;padding:13px 16px;border-radius:10px;border:1px solid #2a3a5a;background:#0a1020;color:#fff;font-size:16px;text-align:center;outline:none;}
  #connexion input:focus{border-color:#9bb8ff;}
  #connexion button{margin-top:14px;padding:13px 34px;border-radius:10px;border:none;background:linear-gradient(90deg,#3a6ad5,#5b9bd5);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .1s;}
  #connexion button:active{transform:scale(0.97);}
  #msg{margin-top:14px;font-size:13px;min-height:18px;color:#ff9b7a;}
  #hud{position:fixed;top:10px;left:10px;z-index:5;font-size:12px;color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.5);padding:8px 12px;border-radius:8px;pointer-events:none;display:flex;align-items:center;gap:8px;}
  #hud .pastille{width:11px;height:11px;border-radius:50%;display:inline-block;}
  #bandeau-stock{position:fixed;top:44px;left:10px;z-index:5;background:rgba(0,0,0,0.55);border-radius:8px;padding:6px 10px;display:flex;flex-wrap:wrap;gap:12px;max-width:62vw;pointer-events:none;}
  #bandeau-stock .res-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#dfe6f5;}
  #bandeau-stock .res-item i{font-size:14px;}
  #bandeau-stock .res-prod{font-size:9.5px;color:#7a9a7a;margin-left:2px;}
  #bandeau-stock .res-empty{font-size:11.5px;color:#5b6b8a;}
  #scale-badge{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:5;font-size:12px;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.45);padding:4px 10px;border-radius:6px;pointer-events:none;}
  #perf-badge{position:fixed;top:10px;right:10px;z-index:5;font-size:11px;color:rgba(255,255,255,0.5);background:rgba(0,0,0,0.45);padding:4px 9px;border-radius:6px;pointer-events:none;}
  #joueurs-panel{position:fixed;top:44px;right:10px;z-index:5;font-size:12px;color:rgba(255,255,255,0.8);background:rgba(0,0,0,0.5);padding:8px 12px;border-radius:8px;max-width:180px;}
  #joueurs-panel h4{font-size:10px;color:#9bb8ff;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;}
  #joueurs-panel .pj{display:flex;align-items:center;gap:6px;padding:2px 0;}
  #joueurs-panel .pastille{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
  #info{position:fixed;bottom:46px;left:10px;z-index:5;font-size:12px;color:#fff;background:rgba(0,0,0,0.55);padding:7px 11px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .15s;}
  #version{position:fixed;bottom:8px;left:12px;z-index:5;font-size:10px;color:rgba(255,255,255,0.4);pointer-events:none;line-height:1.4;}
  #version span{color:rgba(255,255,255,0.6);font-weight:500;}
  #btn-home{position:fixed;bottom:42px;right:10px;z-index:5;font-size:12px;color:#9bd5d0;background:rgba(10,20,35,0.8);border:1px solid #2a4a5a;padding:7px 12px;border-radius:8px;cursor:pointer;}
  #btn-planetes{position:fixed;bottom:42px;right:118px;z-index:6;font-size:12px;color:#9bb8ff;background:rgba(10,20,35,0.8);border:1px solid #2a3a5a;padding:7px 12px;border-radius:8px;cursor:pointer;}
  #panel-planetes{position:fixed;left:10px;top:44px;bottom:60px;width:220px;z-index:7;background:rgba(8,12,24,0.96);border:1px solid #2a3a5a;border-radius:12px;padding:10px;display:none;flex-direction:column;}
  #panel-planetes h3{font-size:12px;color:#9bb8ff;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
  #panel-planetes .pp-close2{cursor:pointer;color:#8a97b5;}
  #liste-mes-planetes{overflow-y:auto;flex:1;}
  .mp-item{padding:8px 9px;border-radius:8px;margin-bottom:5px;cursor:pointer;border:1px solid transparent;background:rgba(255,255,255,0.03);}
  .mp-item:hover{background:rgba(155,184,255,0.08);}
  .mp-item.sel{border-color:#9bb8ff;background:rgba(155,184,255,0.12);}
  .mp-nom{font-size:13px;color:#fff;font-weight:500;display:flex;align-items:center;gap:6px;}
  .mp-sci{font-size:10.5px;color:#7a8aa5;font-style:italic;margin-top:1px;}
  .mp-type{font-size:10px;color:#5b6b8a;margin-top:2px;}
  .mp-empty{font-size:12px;color:#5b6b8a;text-align:center;padding:20px 5px;}
  #pp-rename{margin-top:8px;display:none;}
  #pp-rename input{width:100%;padding:7px 9px;border-radius:7px;border:1px solid #2a3a5a;background:#0a1020;color:#fff;font-size:13px;outline:none;}
  #pp-rename input:focus{border-color:#9bb8ff;}
  #pp-rename .rrow{display:flex;gap:5px;margin-top:5px;}
  #pp-rename button{flex:1;padding:6px;border-radius:7px;border:none;font-size:12px;cursor:pointer;}
  #popup{position:fixed;top:44px;right:200px;width:250px;max-height:calc(100% - 60px);overflow-y:auto;background:rgba(10,14,28,0.97);border:1px solid #2a3a5a;border-radius:12px;padding:14px;box-shadow:0 8px 30px rgba(0,0,0,0.5);z-index:8;display:none;}
  #popup .ppclose{cursor:pointer;color:#8a97b5;font-size:16px;padding:2px;}
  #pp-action{margin-top:10px;}
  #pp-action button{width:100%;padding:9px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-colo{background:linear-gradient(90deg,#2a8a5a,#3aa56a);color:#fff;}
  .btn-mine{background:rgba(155,213,208,0.15);color:#9bd5d0;border:1px solid rgba(155,213,208,0.3)!important;}
  .btn-taken{background:rgba(255,120,90,0.12);color:#ff9b7a;border:1px solid rgba(255,120,90,0.3)!important;}
</style>
</head>
<body>
<div id="connexion">
  <h1>EMPIRE GALACTIQUE</h1>
  <p>Conquête spatiale · univers persistant</p>
  <input id="pseudo" type="text" placeholder="Ton pseudo de commandant" maxlength="20" autocomplete="off">
  <button id="entrer">Entrer dans la galaxie</button>
  <div id="msg"></div>
</div>
<div id="jeu" style="display:none">
  <canvas id="sky"></canvas>
  <div id="hud"><span class="pastille" id="hud-col"></span>Commandant <strong id="moncom">—</strong></div>
  <div id="bandeau-stock"></div>
  <div id="scale-badge">Galaxie</div>
  <div id="perf-badge"></div>
  <div id="joueurs-panel"><h4>Commandants</h4><div id="liste-joueurs">—</div></div>
  <div id="info"></div>
  <div id="btn-home"><i class="ti ti-home"></i> Ma planète</div>
  <div id="btn-planetes"><i class="ti ti-list"></i> Mes planètes</div>
  <div id="panel-planetes">
    <h3>Mes planètes <span class="pp-close2" id="panel-close"><i class="ti ti-x"></i></span></h3>
    <div id="liste-mes-planetes"></div>
  </div>
  <div id="version"><span id="ver">v1.5</span> · économie : production de ressources dans le temps + stock</div>
  <div id="popup">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div id="pp-nom" style="font-size:15px;font-weight:600;">—</div>
      <div class="ppclose" id="pp-close"><i class="ti ti-x"></i></div>
    </div>
    <div id="pp-type" style="font-size:12px;color:#8a97b5;margin-bottom:2px;">—</div>
    <div id="pp-owner" style="font-size:12px;margin-bottom:8px;"></div>
    <div id="pp-tag" style="margin-bottom:8px;"></div>
    <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#5b6b8a;margin-bottom:6px;">Composition</div>
    <div id="pp-res"></div>
    <div id="pp-rename">
      <input id="pp-rename-input" type="text" maxlength="40" placeholder="Nouveau nom...">
      <div class="rrow">
        <button id="pp-rename-ok" style="background:linear-gradient(90deg,#3a6ad5,#5b9bd5);color:#fff;">Valider</button>
        <button id="pp-rename-cancel" style="background:rgba(255,255,255,0.08);color:#aaa;">Annuler</button>
      </div>
    </div>
    <div id="pp-action"></div>
  </div>
</div>
<script>
// ============================================================
//  EMPIRE GALACTIQUE — client v1.3
//  Connecte au serveur : planete d'origine, colonisation, couleurs joueurs.
// ============================================================
let GRAINE=20260614, MON_PSEUDO=null, MON_HOME=null, MA_COULEUR='#9bd5d0';
let POSSESSIONS={};   // addr -> {joueur, origine, nom_perso}
let COULEURS={};      // joueur -> couleur

// palette deterministe de couleurs par joueur
const PALETTE=['#9bd5d0','#ff9b7a','#9bb8ff','#ffd84a','#ff7ad8','#7ade9b','#d89bff','#ffb04a','#5bd5e0','#e0d05b'];
function couleurJoueur(nom){
  if(COULEURS[nom]) return COULEURS[nom];
  let h=0; for(let i=0;i<nom.length;i++) h=(h*31+nom.charCodeAt(i))>>>0;
  const c=PALETTE[h%PALETTE.length]; COULEURS[nom]=c; return c;
}

const elConnexion=document.getElementById('connexion');
const elJeu=document.getElementById('jeu');
const elPseudo=document.getElementById('pseudo');
const elMsg=document.getElementById('msg');
document.getElementById('entrer').addEventListener('click',entrer);
elPseudo.addEventListener('keydown',e=>{ if(e.key==='Enter') entrer(); });

let goHomeRequested=false;
async function entrer(){
  const pseudo=elPseudo.value.trim();
  if(pseudo.length<2){ elMsg.textContent="Choisis un pseudo (2 lettres min)."; return; }
  elMsg.style.color='#8a97b5'; elMsg.textContent="Connexion...";
  try{
    const r=await fetch('/api/connexion',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pseudo})});
    const data=await r.json();
    if(data.graine) GRAINE=data.graine;
    MON_PSEUDO=data.pseudo||pseudo;
    MON_HOME=data.home||null;
    MA_COULEUR=couleurJoueur(MON_PSEUDO);
    document.getElementById('moncom').textContent=MON_PSEUDO;
    document.getElementById('hud-col').style.background=MA_COULEUR;
    elConnexion.style.display='none'; elJeu.style.display='block';
    await chargerPossessions();
    await chargerStock();
    demarrerJeu();
    goHomeRequested=true; // la galaxie ira sur le home au 1er rendu
    rafraichirJoueurs(); setInterval(rafraichirJoueurs,5000);
    setInterval(chargerPossessions,4000); // polling colonisations
    setInterval(chargerStock,15000);      // resync stock serveur toutes les 15s
    setInterval(majBandeauStock,1000);    // interpolation visuelle chaque seconde
    majBandeauStock();
  }catch(e){ elMsg.style.color='#ff9b7a'; elMsg.textContent="Serveur injoignable. Réessaie."; }
}
async function chargerPossessions(){
  try{ const r=await fetch('/api/possessions'); const d=await r.json();
    const map={}; for(const p of (d.possessions||[])){ map[p.addr]={joueur:p.joueur,origine:p.origine,nom_perso:p.nom_perso}; }
    POSSESSIONS=map;
  }catch(e){}
}
async function rafraichirJoueurs(){
  try{ const r=await fetch('/api/joueurs'); const d=await r.json();
    const html=(d.joueurs||[]).map(j=>{ const c=couleurJoueur(j.nom);
      return '<div class="pj"><span class="pastille" style="background:'+c+'"></span>'+(j.nom===MON_PSEUDO?'<strong>'+j.nom+'</strong>':j.nom)+'</div>'; }).join('');
    document.getElementById('liste-joueurs').innerHTML=html||'—';
  }catch(e){}
}
async function coloniser(addr){
  try{ const r=await fetch('/api/coloniser',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pseudo:MON_PSEUDO,addr})});
    const d=await r.json();
    if(d.succes){ POSSESSIONS[addr]={joueur:MON_PSEUDO,origine:false,nom_perso:null}; return {ok:true}; }
    return {ok:false,msg:d.message||"Impossible"};
  }catch(e){ return {ok:false,msg:"Serveur injoignable"}; }
}
async function renommer(addr,nom){
  try{ const r=await fetch('/api/renommer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pseudo:MON_PSEUDO,addr,nom})});
    const d=await r.json();
    if(d.succes){ if(POSSESSIONS[addr]) POSSESSIONS[addr].nom_perso=nom||null; return {ok:true}; }
    return {ok:false,msg:d.message||"Impossible"};
  }catch(e){ return {ok:false,msg:"Serveur injoignable"}; }
}
// nom scientifique deterministe (IDENTIQUE au serveur galaxy.js)
function nomScientifique(addr){
  const m=/^S(\d+)-P(\d+)$/.exec(addr); if(!m) return addr;
  const sysIdx=parseInt(m[1],10), pIdx=parseInt(m[2],10);
  const lettres='bcdefghij'; const lettre=lettres[pIdx]||('p'+pIdx);
  const prefixes=['HD','GJ','HIP','TYC','Kepler','TOI','WASP','K'];
  let s=(100000+sysIdx+99)>>>0; s=(s*1664525+1013904223)>>>0; const prefixe=prefixes[Math.floor((s/4294967296)*prefixes.length)];
  const num=1000+(sysIdx%9000);
  return prefixe+'-'+num+' '+lettre;
}

// ---- ECONOMIE cote client : stock + interpolation visuelle ----
const RES_META={
  fer:{label:'Fer',icon:'ti-pick',col:'#9a8a78',tier:0},silicates:{label:'Silicates',icon:'ti-mountain',col:'#a0998c',tier:0},
  aluminium:{label:'Alu',icon:'ti-pick',col:'#c0b8b0',tier:0},carbone:{label:'Carbone',icon:'ti-leaf',col:'#7a8a6a',tier:0},
  eau:{label:'Eau',icon:'ti-droplet',col:'#5b9bd5',tier:0},biomasse:{label:'Biomasse',icon:'ti-leaf',col:'#7ac74f',tier:0},
  hydrogene:{label:'H₂',icon:'ti-air-balloon',col:'#9bb8ff',tier:0},solaire:{label:'Énergie',icon:'ti-sun',col:'#ffc040',tier:0},
  cuivre:{label:'Cuivre',icon:'ti-ingot',col:'#c8845a',tier:1},nickel:{label:'Nickel',icon:'ti-ingot',col:'#b8b8c0',tier:1},
  zinc:{label:'Zinc',icon:'ti-ingot',col:'#8a8a92',tier:1},plomb:{label:'Plomb',icon:'ti-ingot',col:'#6a6a72',tier:1},
  etain:{label:'Étain',icon:'ti-ingot',col:'#d8d0c0',tier:1},soufre:{label:'Soufre',icon:'ti-flame',col:'#e0a040',tier:1},
  methane:{label:'Méthane',icon:'ti-cloud',col:'#a0b0d0',tier:1},
  titane:{label:'Titane',icon:'ti-ingot',col:'#c0c0c8',tier:2},cobalt:{label:'Cobalt',icon:'ti-flask',col:'#4a6bd5',tier:2},
  lithium:{label:'Lithium',icon:'ti-battery',col:'#e0d090',tier:2},cristaux:{label:'Cristaux',icon:'ti-diamond',col:'#6bb8e0',tier:2},
  helium3:{label:'He-3',icon:'ti-flask',col:'#e06baa',tier:2},
  argent:{label:'Argent',icon:'ti-coin',col:'#e8e0e8',tier:3},uranium:{label:'Uranium',icon:'ti-radioactive',col:'#9bd54f',tier:3},
  thorium:{label:'Thorium',icon:'ti-radioactive',col:'#7ab84f',tier:3},terres_rares:{label:'T. rares',icon:'ti-stars',col:'#a0c8e8',tier:3},
  gaz_exo:{label:'Gaz exo',icon:'ti-cloud-fog',col:'#d8a878',tier:3},
  or:{label:'Or',icon:'ti-coin',col:'#ffd84a',tier:4},platine:{label:'Platine',icon:'ti-coin',col:'#dfe8f0',tier:4},
  palladium:{label:'Palladium',icon:'ti-coin',col:'#c8d0d8',tier:4},cristaux_exo:{label:'Cristaux exo',icon:'ti-diamond',col:'#b088e0',tier:4},
  antimatiere:{label:'Antimatière',icon:'ti-atom',col:'#b088e0',tier:5},metamateriaux:{label:'Métamat.',icon:'ti-sparkles',col:'#88e0d0',tier:5}
};
let STOCK={};        // ressource -> quantite (au dernier appel serveur)
let PROD_H={};       // ressource -> production/heure
let stockTimestamp=0; // quand on a recu le stock
async function chargerStock(){
  if(!MON_PSEUDO) return;
  try{ const r=await fetch('/api/stock?pseudo='+encodeURIComponent(MON_PSEUDO)); const d=await r.json();
    STOCK=d.stock||{}; PROD_H=d.productionHoraire||{}; stockTimestamp=Date.now();
  }catch(e){}
}
function majBandeauStock(){
  const el=document.getElementById('bandeau-stock'); if(!el) return;
  const keys=Object.keys(STOCK).filter(k=>STOCK[k]>0 || PROD_H[k]>0);
  if(keys.length===0){ el.innerHTML='<span class="res-empty">Aucune ressource — colonise une planète pour produire</span>'; return; }
  // tri par rareté décroissante puis quantité
  keys.sort((a,b)=>(RES_META[b]?.tier||0)-(RES_META[a]?.tier||0) || STOCK[b]-STOCK[a]);
  // interpolation : quantité affichée = stock + prod * temps écoulé
  const ecoule=(Date.now()-stockTimestamp)/3600000; // en heures
  let html='';
  for(const k of keys.slice(0,12)){ const m=RES_META[k]; if(!m) continue;
    const qte=(STOCK[k]||0)+(PROD_H[k]||0)*ecoule;
    const prodTxt=PROD_H[k]?'<span class="res-prod">+'+(PROD_H[k]).toFixed(PROD_H[k]<1?2:0)+'/h</span>':'';
    html+='<div class="res-item"><i class="'+m.icon+'" style="color:'+m.col+'"></i>'+Math.floor(qte).toLocaleString('fr-FR')+prodTxt+'</div>';
  }
  el.innerHTML=html;
}
// ============================================================
//  MOTEUR DE GALAXIE (identique a la generation serveur galaxy.js)
// ============================================================
function demarrerJeu(){
  const canvas=document.getElementById('sky');
  const ctx=canvas.getContext('2d');
  const scaleBadge=document.getElementById('scale-badge');
  const perfBadge=document.getElementById('perf-badge');
  const info=document.getElementById('info');
  const popup=document.getElementById('popup');
  document.getElementById('pp-close').addEventListener('click',()=>{ popup.style.display='none'; selectedPlanet=null; });
  document.getElementById('btn-home').addEventListener('click',()=>{ allerAuHome(); });

  let W,H,DPR;
  function resize(){ DPR=window.devicePixelRatio||1; W=window.innerWidth; H=window.innerHeight;
    canvas.style.width=W+'px'; canvas.style.height=H+'px'; canvas.width=W*DPR; canvas.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
  window.addEventListener('resize',resize);

  const cam={x:0,y:0,zoom:0.012,tx:0,ty:0,tzoom:0.012};
  const ZOOM_MIN=0.006,ZOOM_MAX=14;
  function w2s(wx,wy){ return {x:(wx-cam.x)*cam.zoom+W/2,y:(wy-cam.y)*cam.zoom+H/2}; }
  function s2w(sx,sy){ return {x:(sx-W/2)/cam.zoom+cam.x,y:(sy-H/2)/cam.zoom+cam.y}; }
  function rng(seed){ let s=seed>>>0; return ()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }

  const STAR_TYPES=[
    {cls:'M',label:'Naine rouge',core:'#ffd9c0',edge:'#e8502a',halo:'235,90,50',rFactor:0.55,freq:34,lum:0.7,tw:0.10},
    {cls:'K',label:'Naine orange',core:'#ffe8c8',edge:'#f0832e',halo:'245,140,60',rFactor:0.8,freq:20,lum:0.8,tw:0.08},
    {cls:'G',label:'Naine jaune',core:'#fffdf2',edge:'#f5b840',halo:'250,200,110',rFactor:1.0,freq:16,lum:0.9,tw:0.06},
    {cls:'F',label:'Blanc-jaune',core:'#fffef8',edge:'#f5dca0',halo:'250,230,180',rFactor:1.2,freq:10,lum:0.95,tw:0.05},
    {cls:'A',label:'Étoile blanche',core:'#ffffff',edge:'#cfe0f5',halo:'200,220,250',rFactor:1.5,freq:7,lum:1.0,tw:0.05},
    {cls:'B',label:'Géante bleue',core:'#f0f6ff',edge:'#7ba8f0',halo:'130,175,250',rFactor:2.4,freq:5,lum:1.1,tw:0.04},
    {cls:'DA',label:'Naine blanche',core:'#ffffff',edge:'#bcd4f5',halo:'190,215,250',rFactor:0.32,freq:5,lum:1.1,tw:0.14},
    {cls:'RG',label:'Géante rouge',core:'#ffdcb0',edge:'#e85a28',halo:'235,90,45',rFactor:3.0,freq:3,lum:0.85,tw:0.07}
  ];
  const STAR_POOL=[]; STAR_TYPES.forEach((s,i)=>{ for(let k=0;k<s.freq;k++) STAR_POOL.push(i); });
  const RES={

    const owner=POSSESSIONS[p.addr];
    const ownEl=document.getElementById('pp-owner');
    if(owner){ const c=couleurJoueur(owner.joueur); ownEl.innerHTML='<span style="color:'+c+'">● '+owner.joueur+(owner.joueur===MON_PSEUDO?' (vous)':'')+(owner.origine?' · monde d\'origine':'')+'</span>'; }
    else ownEl.innerHTML='<span style="color:#7a8aa5">● Libre</span>';
    document.getElementById('pp-tag').innerHTML=p.hotspot?'<span style="display:inline-block;font-size:10.5px;color:#ffcb46;background:rgba(255,200,70,0.12);border:1px solid rgba(255,200,70,0.4);padding:2px 8px;border-radius:6px;"><i class="ti ti-star" style="font-size:11px;"></i> Point d\'intérêt</span>':'';
    let html=''; if(!p.resources.length) html='<div style="color:#5b6b8a;font-size:12px;">Aucune ressource notable</div>';
    for(const rr of p.resources){ const def=RES[rr.key]; html+='<div style="padding:5px 0;border-bottom:0.5px solid rgba(255,255,255,0.05);"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;"><span style="display:flex;align-items:center;gap:7px;font-size:12.5px;color:#dfe6f5;"><i class="'+def.icon+'" style="color:'+def.col+';font-size:15px;"></i>'+def.label+'</span><span style="font-size:10px;color:'+TIER_COL[rr.tier]+';font-weight:500;">'+rr.d+'/10</span></div><div style="line-height:0;">'+densBar(rr.d,rr.tier)+'</div></div>'; }
    document.getElementById('pp-res').innerHTML=html;
    // production horaire si c'est MA planète
    if(owner && owner.joueur===MON_PSEUDO){
      let prodHtml='<div style="margin-top:8px;font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#5b6b8a;margin-bottom:4px;">Production / heure</div>';
      for(const rr of p.resources){ const m=RES_META[rr.key]; if(!m) continue;
        const taux={fer:6,silicates:6,aluminium:5,carbone:5,eau:6,biomasse:5,hydrogene:6,solaire:6,cuivre:3,nickel:3,zinc:3,plomb:2.5,etain:2.5,soufre:3,methane:3,titane:1.5,cobalt:1.2,lithium:1.5,cristaux:1.2,helium3:1.5,argent:0.5,uranium:0.5,thorium:0.4,terres_rares:0.5,gaz_exo:0.5,or:0.2,platine:0.18,palladium:0.18,cristaux_exo:0.12,antimatiere:0.04,metamateriaux:0.04}[rr.key]||0;
        const ph=(rr.d*taux);
        prodHtml+='<div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:1px 0;"><span style="color:#bfc8d8;"><i class="'+m.icon+'" style="color:'+m.col+';font-size:13px;"></i> '+RES[rr.key].label+'</span><span style="color:#7ac79a;">+'+ph.toFixed(ph<1?2:0)+'/h</span></div>';
      }
      document.getElementById('pp-res').innerHTML=html+prodHtml;
    }
    document.getElementById('pp-rename').style.display='none';
    const act=document.getElementById('pp-action');
    if(!owner){ act.innerHTML='<button class="btn-colo" id="do-colo"><i class="ti ti-flag"></i> Coloniser</button>';
      document.getElementById('do-colo').onclick=async()=>{ act.innerHTML='<button class="btn-colo" disabled>Colonisation...</button>';
        const res=await coloniser(p.addr); if(res.ok){ chargerStock(); montrerPopup(p); majPanneauPlanetes(); } else { act.innerHTML='<button class="btn-taken">'+res.msg+'</button>'; setTimeout(()=>montrerPopup(p),1500); } };
    } else if(owner.joueur===MON_PSEUDO){
      act.innerHTML='<button class="btn-mine" id="do-rename"><i class="ti ti-pencil"></i> Renommer</button>';
      document.getElementById('do-rename').onclick=()=>{
        const rn=document.getElementById('pp-rename'); rn.style.display='block';
        const inp=document.getElementById('pp-rename-input'); inp.value=owner.nom_perso||''; inp.focus();
      };
    } else { act.innerHTML='<button class="btn-taken"><i class="ti ti-lock"></i> Possédée par '+owner.joueur+'</button>'; }
    document.getElementById('popup').style.display='block';
  }
  // gestion des boutons de renommage (une seule fois)
  document.getElementById('pp-rename-ok').onclick=async()=>{
    if(!selectedPlanet) return;
    const nom=document.getElementById('pp-rename-input').value.trim();
    const res=await renommer(selectedPlanet.addr,nom);
    if(res.ok){ document.getElementById('pp-rename').style.display='none'; montrerPopup(selectedPlanet); majPanneauPlanetes(); }
  };
  document.getElementById('pp-rename-input').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('pp-rename-ok').click(); });
  document.getElementById('pp-rename-cancel').onclick=()=>{ document.getElementById('pp-rename').style.display='none'; };

  // ---- PANNEAU MES PLANETES ----
  function mesPlanetes(){
    const out=[];
    for(const addr in POSSESSIONS){
      if(POSSESSIONS[addr].joueur===MON_PSEUDO){
        const m=/^S(\d+)-P(\d+)$/.exec(addr); if(!m) continue;
        const sysIdx=parseInt(m[1],10), pIdx=parseInt(m[2],10);
        const sys=SYS_BY_IDX[sysIdx]; if(!sys) continue;
        ensurePlanets(sys); const p=sys.planets[pIdx]; if(!p) continue;
        out.push({addr,p,sys,origine:POSSESSIONS[addr].origine});
      }
    }
    // monde d'origine en premier, puis par nom
    out.sort((a,b)=> (b.origine?1:0)-(a.origine?1:0) || nomAffiche(a.p).localeCompare(nomAffiche(b.p)));
    return out;
  }
  function majPanneauPlanetes(){
    const liste=document.getElementById('liste-mes-planetes');
    const mp=mesPlanetes();
    if(mp.length===0){ liste.innerHTML='<div class="mp-empty">Aucune planète colonisée pour l\'instant.<br><br>Clique une planète libre et colonise-la !</div>'; return; }
    let html='';
    for(const it of mp){
      const sel=selectedPlanet===it.p?' sel':'';
      html+='<div class="mp-item'+sel+'" data-addr="'+it.addr+'">'+
        '<div class="mp-nom">'+(it.origine?'<i class="ti ti-home" style="font-size:12px;color:'+MA_COULEUR+'"></i>':'<i class="ti ti-planet" style="font-size:12px;color:'+MA_COULEUR+'"></i>')+nomAffiche(it.p)+'</div>'+
        '<div class="mp-sci">'+nomScientifique(it.addr)+'</div>'+
        '<div class="mp-type">'+it.p.def.label+' · '+it.sys.name+'</div>'+
      '</div>';
    }
    liste.innerHTML=html;
    // 1 clic = selectionne (popup), 2 clics = centre
    liste.querySelectorAll('.mp-item').forEach(el=>{
      const addr=el.getAttribute('data-addr');
      const m=/^S(\d+)-P(\d+)$/.exec(addr); const sysIdx=parseInt(m[1],10), pIdx=parseInt(m[2],10);
      const sys=SYS_BY_IDX[sysIdx]; ensurePlanets(sys); const p=sys.planets[pIdx];
      el.addEventListener('click',()=>{ montrerPopup(p); majPanneauPlanetes(); });
      el.addEventListener('dblclick',()=>{ cam.tx=sys.x; cam.ty=sys.y; cam.tzoom=Math.max(cam.tzoom,3); montrerPopup(p); });
    });
  }
  window.majPanneauPlanetes=majPanneauPlanetes;
  document.getElementById('btn-planetes').addEventListener('click',()=>{
    const pan=document.getElementById('panel-planetes');
    const show=pan.style.display!=='flex'; pan.style.display=show?'flex':'none';
    if(show) majPanneauPlanetes();
  });
  document.getElementById('panel-close').addEventListener('click',()=>{ document.getElementById('panel-planetes').style.display='none'; });

  window.allerAuHome=function(){
    if(!MON_HOME) return;
    const m=/^S(\d+)-P(\d+)$/.exec(MON_HOME); if(!m) return;
    const sysIdx=parseInt(m[1],10); const sys=SYS_BY_IDX[sysIdx]; if(!sys) return;
    cam.tx=sys.x; cam.ty=sys.y; cam.tzoom=2.6;
  };

  canvas.addEventListener('wheel',(e)=>{ e.preventDefault(); const b=s2w(mouse.x,mouse.y); const f=e.deltaY<0?1.15:1/1.15;
    cam.tzoom=Math.min(ZOOM_MAX,Math.max(ZOOM_MIN,cam.tzoom*f)); cam.zoom=cam.tzoom; const a=s2w(mouse.x,mouse.y);
    cam.tx+=b.x-a.x; cam.ty+=b.y-a.y; cam.x+=b.x-a.x; cam.y+=b.y-a.y; },{passive:false});
  canvas.addEventListener('mousedown',(e)=>{ mouse.down=true; mouse.dragged=false; mouse.lx=e.clientX; mouse.ly=e.clientY; canvas.style.cursor='grabbing'; });
  window.addEventListener('mouseup',()=>{ if(mouse.down&&!mouse.dragged){ const h=planetAtCursor(); if(h) montrerPopup(h.p); else if(hoverSys){ cam.tx=hoverSys.x; cam.ty=hoverSys.y; cam.tzoom=Math.max(cam.tzoom,2.2); } } mouse.down=false; canvas.style.cursor='grab'; });
  canvas.addEventListener('mousemove',(e)=>{ const r=canvas.getBoundingClientRect(); mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
    if(mouse.down){ const dx=e.clientX-mouse.lx,dy=e.clientY-mouse.ly; if(Math.hypot(dx,dy)>3) mouse.dragged=true; cam.x-=dx/cam.zoom; cam.y-=dy/cam.zoom; cam.tx=cam.x; cam.ty=cam.y; mouse.lx=e.clientX; mouse.ly=e.clientY; } });
  canvas.addEventListener('mouseleave',()=>{ mouse.x=-999; mouse.y=-999; });
  let pinchD=0;
  canvas.addEventListener('touchstart',(e)=>{ if(e.touches.length===1){ mouse.down=true; mouse.dragged=false; const r=canvas.getBoundingClientRect(); mouse.lx=e.touches[0].clientX; mouse.ly=e.touches[0].clientY; mouse.x=e.touches[0].clientX-r.left; mouse.y=e.touches[0].clientY-r.top; } else if(e.touches.length===2){ pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); } },{passive:true});
  canvas.addEventListener('touchmove',(e)=>{ if(e.touches.length===1&&mouse.down){ const dx=e.touches[0].clientX-mouse.lx,dy=e.touches[0].clientY-mouse.ly; if(Math.hypot(dx,dy)>3) mouse.dragged=true; cam.x-=dx/cam.zoom; cam.y-=dy/cam.zoom; cam.tx=cam.x; cam.ty=cam.y; const r=canvas.getBoundingClientRect(); mouse.x=e.touches[0].clientX-r.left; mouse.y=e.touches[0].clientY-r.top; mouse.lx=e.touches[0].clientX; mouse.ly=e.touches[0].clientY; } else if(e.touches.length===2){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); if(pinchD){ cam.tzoom=Math.min(ZOOM_MAX,Math.max(ZOOM_MIN,cam.tzoom*(d/pinchD))); cam.zoom=cam.tzoom; } pinchD=d; } },{passive:true});
  canvas.addEventListener('touchend',()=>{ if(mouse.down&&!mouse.dragged){ const h=planetAtCursor(); if(h) montrerPopup(h.p); } mouse.down=false; pinchD=0; });
  resetBtn_safe();
  function resetBtn_safe(){ const b=document.querySelector('#btn-home'); /* reset géré ailleurs */ }

  let frameCount=0,fps=60,fpsT=performance.now();
  function draw(){
    const now=performance.now(); const dt=(now-last)/1000; last=now; t+=dt*2.2;
    if(goHomeRequested){ goHomeRequested=false; allerAuHome(); }
    cam.x+=(cam.tx-cam.x)*Math.min(1,dt*9); cam.y+=(cam.ty-cam.y)*Math.min(1,dt*9); cam.zoom+=(cam.tzoom-cam.zoom)*Math.min(1,dt*9);
    ctx.clearRect(0,0,W,H);
    for(const s of bgStars){ ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,6.28); ctx.fill(); }
    const fS=smooth(LOD_SYSTEM,LOD_FULL,cam.zoom),fA=smooth(LOD_APPROACH,LOD_SYSTEM,cam.zoom),fPN=smooth(LOD_FULL-0.2,LOD_FULL+0.5,cam.zoom);
    const bs=Math.max(1.2,2+cam.zoom*1.2); hoverSys=null; ctx.textAlign='center'; candidates=[];
    const tl=s2w(0,0),brr=s2w(W,H); const cx0=Math.floor(tl.x/CELL)-1,cx1=Math.floor(brr.x/CELL)+1,cy0=Math.floor(tl.y/CELL)-1,cy1=Math.floor(brr.y/CELL)+1;
    let vis=0; const showP=fS>0.01;
    for(let cx=cx0;cx<=cx1;cx++){ for(let cy=cy0;cy<=cy1;cy++){ const cell=grid.get(cellKey(cx,cy)); if(!cell) continue;
      for(const sys of cell){ const sp=w2s(sys.x,sys.y); const op=(sys.maxOrbit||300)*cam.zoom+120;
        if(sp.x<-op||sp.x>W+op||sp.y<-op||sp.y>H+op) continue; vis++; let si=null;
        if(showP){ ensurePlanets(sys);
          if(sys.hasBelt){ if(!sys._belt) sys._belt=makeParticles(sys.seed+555,120,sys.beltInner,sys.beltOuter,2600);
            for(const a of sys._belt){ const ang=a.a0+(2*Math.PI/a.period)*t; const wx=sys.x+Math.cos(ang)*a.rad,wy=sys.y+Math.sin(ang)*a.rad; const pp=w2s(wx,wy); if(pp.x<-20||pp.x>W+20||pp.y<-20||pp.y>H+20) continue; const c=a.tone>0.5?'200,190,170':'150,140,125'; ctx.fillStyle='rgba('+c+','+(a.bright*fS).toFixed(2)+')'; ctx.beginPath(); ctx.arc(pp.x,pp.y,Math.max(0.4,a.size*cam.zoom*0.5),0,6.28); ctx.fill(); } }
          if(fS>0.2){ for(const p of sys.planets){ const a=p.a*cam.zoom,b=a*Math.sqrt(1-p.e*p.e); const dO=Math.abs(Math.hypot(mouse.x-sp.x,mouse.y-sp.y)-a); const near=dO<14&&!mouse.dragged; ctx.beginPath(); ctx.ellipse(sp.x,sp.y,a,b,0,0,6.28); ctx.strokeStyle='rgba(150,170,220,'+((near?0.3:0.1)*fS).toFixed(2)+')'; ctx.lineWidth=near?1.5:1; ctx.stroke(); } }
          si=drawStar(sp,sys,fA,fS,bs,t);
          const drawn=sys.planets.map(p=>{ const loc=planetLocal(p,t); return {p,px:sp.x+loc.x*cam.zoom,py:sp.y+loc.y*cam.zoom,scr:p.size*cam.zoom*0.5}; }).sort((a,b)=>a.py-b.py);
          for(const it of drawn){ if(it.scr>1.2) drawDetailedPlanet(it.p,it.px,it.py,it.scr,sp.x,sp.y,t,fS); else { ctx.globalAlpha=fS; ctx.fillStyle=it.p.def.water||'rgba('+(it.p.def.atmo||'150,150,150')+',1)'; ctx.beginPath(); ctx.arc(it.px,it.py,Math.max(1,it.scr),0,6.28); ctx.fill(); ctx.globalAlpha=1;
              const owner=POSSESSIONS[it.p.addr]; if(owner){ ctx.strokeStyle=couleurJoueur(owner.joueur); ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(it.px,it.py,Math.max(3,it.scr+2),0,6.28); ctx.stroke(); } }
            if(fS>0.4) candidates.push(it);
            if((fPN>0.05&&it.scr>2)||selectedPlanet===it.p){ const a=Math.max(fPN,selectedPlanet===it.p?1:0); ctx.fillStyle='rgba(210,225,255,'+(0.85*a).toFixed(2)+')'; ctx.font='11px sans-serif'; ctx.fillText(nomAffiche(it.p),it.px,it.py-it.scr-5); } }
        } else { si=drawStar(sp,sys,fA,fS,bs,t); }
        if(!mouse.dragged){ const hr=Math.max(12,si.haloR*0.5); if(Math.hypot(mouse.x-sp.x,mouse.y-sp.y)<hr) hoverSys=sys; }
        if((fA>0.15||hoverSys===sys)&&cam.zoom>LOD_APPROACH){ const a=Math.max(fA,hoverSys===sys?1:0); const yo=si.haloR+5+fS*8; ctx.fillStyle='rgba(255,255,255,'+(0.7*a).toFixed(2)+')'; ctx.font=(hoverSys===sys?'bold ':'')+'12px sans-serif'; ctx.fillText(sys.name,sp.x,sp.y-yo); }
      } } }
    const hov=planetAtCursor();
    if(hov&&!mouse.down){ ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(hov.px,hov.py,Math.max(10,hov.scr+7),0,6.28); ctx.stroke(); canvas.style.cursor='pointer'; }
    else if(hoverSys&&!mouse.down){ const sp=w2s(hoverSys.x,hoverSys.y); ctx.strokeStyle='rgba(120,180,255,0.6)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(sp.x,sp.y,Math.max(14,hoverSys.starR*hoverSys.star.rFactor*bs*2.6),0,6.28); ctx.stroke(); canvas.style.cursor='pointer'; }
    else if(!mouse.down){ canvas.style.cursor='grab'; }
    if(cam.zoom>=LOD_SYSTEM){ scaleBadge.textContent='Système'+(hoverSys?' '+hoverSys.name:''); } else if(cam.zoom>=LOD_APPROACH){ scaleBadge.textContent='Approche'; } else { scaleBadge.textContent='Galaxie'; }
    frameCount++; if(now-fpsT>500){ fps=Math.round(frameCount*1000/(now-fpsT)); frameCount=0; fpsT=now; }
    perfBadge.textContent=vis+' systèmes · '+fps+' fps';
    if(hov){ info.style.opacity='1'; const ow=POSSESSIONS[hov.p.addr]; info.innerHTML='<strong>'+hov.p.name+'</strong> · '+hov.p.def.label+(ow?' · <span style="color:'+couleurJoueur(ow.joueur)+'">'+ow.joueur+'</span>':'')+' — clic'; }
    else if(hoverSys){ info.style.opacity='1'; info.innerHTML='<strong>'+hoverSys.name+'</strong> · <span style="color:'+hoverSys.star.core+'">'+hoverSys.star.label+'</span>'; }
    else { info.style.opacity='0'; }
    requestAnimationFrame(draw);
  }
  resize(); requestAnimationFrame(draw);
}
</script>
</body>
