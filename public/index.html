<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Empire Galactique</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#02030a;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;}
  #jeu{position:fixed;inset:0;}
  canvas{display:block;cursor:grab;}
  #connexion{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,#0a1228,#02030a);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;}
  #connexion h1{font-size:clamp(28px,6vw,46px);letter-spacing:3px;margin-bottom:8px;background:linear-gradient(90deg,#9bd5d0,#9bb8ff,#ffb0d8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  #connexion p{color:#8a97b5;margin-bottom:30px;font-size:14px;}
  #connexion input{width:280px;max-width:80vw;padding:13px 16px;border-radius:10px;border:1px solid #2a3a5a;background:#0a1020;color:#fff;font-size:16px;text-align:center;outline:none;margin-bottom:10px;}
  #connexion input:focus{border-color:#9bb8ff;}
  #auth-tabs{display:flex;gap:6px;margin-bottom:18px;background:rgba(10,16,32,0.6);padding:4px;border-radius:10px;}
  .auth-tab{padding:9px 20px;border-radius:8px;border:none;background:transparent;color:#8a97b5;font-size:14px;cursor:pointer;transition:all .15s;}
  .auth-tab.actif{background:linear-gradient(90deg,#3a6ad5,#5b9bd5);color:#fff;font-weight:600;}
  #auth-form{display:flex;flex-direction:column;align-items:center;}
  #connexion button{margin-top:14px;padding:13px 34px;border-radius:10px;border:none;background:linear-gradient(90deg,#3a6ad5,#5b9bd5);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .1s;}
  #connexion button:active{transform:scale(0.97);}
  #msg{margin-top:14px;font-size:13px;min-height:18px;color:#ff9b7a;}
  #hud{position:fixed;top:10px;left:10px;z-index:5;font-size:12px;color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.5);padding:8px 12px;border-radius:8px;display:flex;align-items:center;gap:8px;}
  #hud .pastille{width:11px;height:11px;border-radius:50%;display:inline-block;}
  #bandeau-stock{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:6;background:rgba(6,10,20,0.82);backdrop-filter:blur(8px);border:1px solid rgba(120,140,180,0.18);border-radius:10px;padding:6px 12px;display:flex;flex-wrap:wrap;gap:14px;max-width:80vw;pointer-events:none;justify-content:center;}
  #bandeau-stock .res-item{display:flex;align-items:center;font-size:12.5px;color:#eef2fb;font-weight:500;}
  #bandeau-stock .res-prod{font-size:9.5px;color:#7ac79a;margin-left:3px;}
  #bandeau-stock .res-empty{font-size:11.5px;color:#7a8aa5;}
  #scale-badge{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:5;font-size:12px;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.45);padding:4px 10px;border-radius:6px;pointer-events:none;}
  #perf-badge{position:fixed;top:10px;right:10px;z-index:5;font-size:11px;color:rgba(255,255,255,0.5);background:rgba(0,0,0,0.45);padding:4px 9px;border-radius:6px;pointer-events:none;}
  #joueurs-panel{position:fixed;top:44px;right:10px;z-index:5;font-size:12px;color:rgba(255,255,255,0.8);background:rgba(0,0,0,0.5);padding:8px 12px;border-radius:8px;max-width:180px;}
  #joueurs-panel h4{font-size:10px;color:#9bb8ff;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;}
  #joueurs-panel .pj{display:flex;align-items:center;gap:6px;padding:2px 0;}
  #joueurs-panel .pastille{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
  #info{position:fixed;bottom:46px;left:10px;z-index:5;font-size:12px;color:#fff;background:rgba(0,0,0,0.55);padding:7px 11px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .15s;}
  #version{position:fixed;bottom:8px;left:12px;z-index:5;font-size:10px;color:rgba(255,255,255,0.4);pointer-events:none;line-height:1.4;}
  #version span{color:rgba(255,255,255,0.6);font-weight:500;}
  #btn-home{position:fixed;bottom:42px;right:10px;z-index:5;font-size:12px;color:#9bd5d0;background:rgba(10,20,35,0.8);border:1px solid #2a4a5a;padding:7px 12px;border-radius:8px;cursor:pointer;}
  #btn-planetes{position:fixed;bottom:42px;right:118px;z-index:6;font-size:12px;color:#9bb8ff;background:rgba(10,20,35,0.8);border:1px solid #2a3a5a;padding:7px 12px;border-radius:8px;cursor:pointer;}
  #btn-empire{position:fixed;bottom:42px;right:235px;z-index:6;font-size:12px;color:#9bd5a0;background:rgba(10,25,18,0.8);border:1px solid #2a5a3a;padding:7px 12px;border-radius:8px;cursor:pointer;}
  #panel-empire{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:340px;max-width:90vw;max-height:80vh;z-index:9;background:rgba(8,12,24,0.98);border:1px solid #2a3a5a;border-radius:14px;padding:16px;display:none;flex-direction:column;box-shadow:0 12px 50px rgba(0,0,0,0.6);}
  #panel-construction{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:380px;max-width:92vw;max-height:82vh;z-index:9;background:rgba(8,12,24,0.98);border:1px solid #2a3a5a;border-radius:14px;padding:16px;display:none;flex-direction:column;box-shadow:0 12px 50px rgba(0,0,0,0.6);}
  #panel-construction h3{font-size:14px;color:#9bd5a0;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  #constr-content{overflow-y:auto;}
  .bat-encours{background:rgba(127,200,150,0.1);border:1px solid rgba(127,200,150,0.3);border-radius:10px;padding:10px;margin-bottom:12px;}
  .bat-encours .bar{height:7px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;margin-top:6px;}
  .bat-encours .bar-fill{height:100%;background:linear-gradient(90deg,#3aa56a,#7ade9b);border-radius:4px;transition:width 1s linear;}
  .bat-branche{font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:#5b6b8a;margin:12px 0 6px;}
  .bat-item{display:flex;align-items:center;gap:10px;padding:9px;border-radius:10px;margin-bottom:6px;background:rgba(255,255,255,0.03);border:1px solid transparent;}
  .bat-item.verrouille{opacity:0.5;}
  .bat-icone{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
  .bat-info{flex:1;min-width:0;}
  .bat-nom{font-size:13px;color:#fff;font-weight:500;display:flex;align-items:center;gap:6px;}
  .bat-niv{font-size:10px;color:#9bd5a0;background:rgba(155,213,160,0.15);padding:1px 6px;border-radius:5px;}
  .bat-desc{font-size:10.5px;color:#7a8aa5;margin-top:1px;}
  .bat-cout{font-size:10px;color:#bfc8d8;margin-top:3px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .bat-cout .manque{color:#ff9b7a;}
  .bat-btn{padding:7px 12px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;background:linear-gradient(90deg,#2a8a5a,#3aa56a);color:#fff;}
  .bat-btn:disabled{background:rgba(255,255,255,0.08);color:#5b6b8a;cursor:not-allowed;}
  .bat-btn.max{background:rgba(155,184,255,0.12);color:#9bb8ff;}
  #panel-profil{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:360px;max-width:92vw;max-height:85vh;z-index:10;background:rgba(8,12,24,0.98);border:1px solid #2a3a5a;border-radius:14px;padding:18px;display:none;flex-direction:column;box-shadow:0 12px 50px rgba(0,0,0,0.7);}
  #panel-profil h3{font-size:14px;color:#9bb8ff;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
  #profil-content{overflow-y:auto;}
  .pf-row{margin-bottom:12px;}
  .pf-label{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#5b6b8a;margin-bottom:5px;}
  .pf-input{width:100%;padding:9px 11px;border-radius:8px;border:1px solid #2a3a5a;background:#0a1020;color:#fff;font-size:13px;outline:none;}
  .pf-input:focus{border-color:#9bb8ff;}
  .pf-stat{display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid rgba(255,255,255,0.06);font-size:13px;}
  .pf-stat .v{color:#9bd5a0;font-weight:600;}
  .pf-titre{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 9px;border-radius:7px;background:rgba(155,184,255,0.1);border:1px solid rgba(155,184,255,0.25);color:#bcd0ff;margin:0 4px 4px 0;}
  .pf-choix{display:flex;flex-wrap:wrap;gap:6px;}
  .pf-opt{padding:6px 10px;border-radius:7px;border:1px solid #2a3a5a;background:rgba(255,255,255,0.03);color:#bfc8d8;font-size:12px;cursor:pointer;}
  .pf-opt.sel{border-color:#9bb8ff;background:rgba(155,184,255,0.15);color:#fff;}
  .pf-btn{width:100%;padding:11px;border-radius:9px;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
  .pf-color{width:38px;height:34px;border-radius:7px;border:1px solid #2a3a5a;cursor:pointer;padding:2px;background:#0a1020;}
  #panel-empire h3{font-size:14px;color:#9bd5a0;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:6px;}
  #empire-content{overflow-y:auto;}
  .emp-section{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#5b6b8a;margin:14px 0 7px;}
  .emp-section:first-child{margin-top:0;}
  .emp-res{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:7px;margin-bottom:3px;background:rgba(255,255,255,0.03);}
  .emp-res .l{display:flex;align-items:center;gap:8px;font-size:13px;color:#dfe6f5;}
  .emp-res .r{text-align:right;}
  .emp-res .q{font-size:13px;color:#fff;font-weight:500;}
  .emp-res .p{font-size:10px;color:#7ac79a;}
  .emp-stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,0.06);font-size:13px;}
  .emp-stat .v{color:#9bd5a0;font-weight:600;}
  .emp-tier-label{font-size:9px;padding:1px 6px;border-radius:4px;margin-left:6px;}
  #panel-planetes{position:fixed;left:10px;top:44px;bottom:60px;width:220px;z-index:7;background:rgba(8,12,24,0.96);border:1px solid #2a3a5a;border-radius:12px;padding:10px;display:none;flex-direction:column;}
  #panel-planetes h3{font-size:12px;color:#9bb8ff;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
  #panel-planetes .pp-close2{cursor:pointer;color:#8a97b5;}
  #liste-mes-planetes{overflow-y:auto;flex:1;}
  .mp-item{padding:8px 9px;border-radius:8px;margin-bottom:5px;cursor:pointer;border:1px solid transparent;background:rgba(255,255,255,0.03);}
  .mp-item:hover{background:rgba(155,184,255,0.08);}
  .mp-item.sel{border-color:#9bb8ff;background:rgba(155,184,255,0.12);}
  .mp-nom{font-size:13px;color:#fff;font-weight:500;display:flex;align-items:center;gap:6px;}
  .mp-sci{font-size:10.5px;color:#7a8aa5;font-style:italic;margin-top:1px;}
  .mp-type{font-size:10px;color:#5b6b8a;margin-top:2px;}
  .mp-empty{font-size:12px;color:#5b6b8a;text-align:center;padding:20px 5px;}
  #pp-rename{margin-top:8px;display:none;}
  #pp-rename input{width:100%;padding:7px 9px;border-radius:7px;border:1px solid #2a3a5a;background:#0a1020;color:#fff;font-size:13px;outline:none;}
  #pp-rename input:focus{border-color:#9bb8ff;}
  #pp-rename .rrow{display:flex;gap:5px;margin-top:5px;}
  #pp-rename button{flex:1;padding:6px;border-radius:7px;border:none;font-size:12px;cursor:pointer;}
  #popup{position:fixed;top:44px;right:200px;width:250px;max-height:calc(100% - 60px);overflow-y:auto;background:rgba(10,14,28,0.97);border:1px solid #2a3a5a;border-radius:12px;padding:14px;box-shadow:0 8px 30px rgba(0,0,0,0.5);z-index:8;display:none;}
  #popup .ppclose{cursor:pointer;color:#8a97b5;font-size:16px;padding:2px;}
  #pp-action{margin-top:10px;}
  #pp-action button{width:100%;padding:9px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-colo{background:linear-gradient(90deg,#2a8a5a,#3aa56a);color:#fff;}
  .btn-mine{background:rgba(155,213,208,0.15);color:#9bd5d0;border:1px solid rgba(155,213,208,0.3)!important;}
  .btn-taken{background:rgba(255,120,90,0.12);color:#ff9b7a;border:1px solid rgba(255,120,90,0.3)!important;}
</style>
</head>
<body>
<div id="connexion">
  <h1>EMPIRE GALACTIQUE</h1>
  <p>Conquête spatiale · univers persistant</p>
  <div id="auth-tabs">
    <button id="tab-connexion" class="auth-tab actif">Se connecter</button>
    <button id="tab-inscription" class="auth-tab">Créer un compte</button>
  </div>
  <div id="auth-form">
    <input id="pseudo" type="text" placeholder="Pseudo de commandant" maxlength="20" autocomplete="off">
    <input id="motdepasse" type="password" placeholder="Mot de passe" maxlength="60" autocomplete="off">
    <button id="entrer">Entrer dans la galaxie</button>
  </div>
  <div id="msg"></div>
</div>
<div id="jeu" style="display:none">
  <canvas id="sky"></canvas>
  <div id="hud"><span class="pastille" id="hud-col"></span>Commandant <strong id="moncom">—</strong> <span id="hud-profil" style="cursor:pointer;color:#9bb8ff;margin-left:6px;pointer-events:auto;">⚙ profil</span></div>
  <div id="bandeau-stock"></div>
  <div id="scale-badge">Galaxie</div>
  <div id="perf-badge"></div>
  <div id="joueurs-panel"><h4>Commandants</h4><div id="liste-joueurs">—</div></div>
  <div id="info"></div>
  <div id="btn-home">⌂ Ma planète</div>
  <div id="btn-planetes">☰ Mes planètes</div>
  <div id="btn-empire">◊ Empire</div>
  <div id="panel-planetes">
    <h3>Mes planètes <span class="pp-close2" id="panel-close">✕</span></h3>
    <div id="liste-mes-planetes"></div>
  </div>
  <div id="panel-empire">
    <h3>◊ Mon Empire <span class="pp-close2" id="empire-close">✕</span></h3>
    <div id="empire-content"></div>
  </div>
  <div id="panel-construction">
    <h3 id="constr-titre">Gestion de planète <span class="pp-close2" id="constr-close">✕</span></h3>
    <div id="constr-content"></div>
  </div>
  <div id="panel-profil">
    <h3 id="profil-titre">Profil <span class="pp-close2" id="profil-close">✕</span></h3>
    <div id="profil-content"></div>
  </div>
  <div id="version"><span id="ver">v2.3</span> · icônes bâtiments isométriques</div>
  <div id="popup">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div id="pp-nom" style="font-size:15px;font-weight:600;">—</div>
      <div class="ppclose" id="pp-close">✕</div>
    </div>
    <div id="pp-type" style="font-size:12px;color:#8a97b5;margin-bottom:2px;">—</div>
    <div id="pp-owner" style="font-size:12px;margin-bottom:8px;"></div>
    <div id="pp-tag" style="margin-bottom:8px;"></div>
    <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#5b6b8a;margin-bottom:6px;">Composition</div>
    <div id="pp-res"></div>
    <div id="pp-rename">
      <input id="pp-rename-input" type="text" maxlength="40" placeholder="Nouveau nom...">
      <div class="rrow">
        <button id="pp-rename-ok" style="background:linear-gradient(90deg,#3a6ad5,#5b9bd5);color:#fff;">Valider</button>
        <button id="pp-rename-cancel" style="background:rgba(255,255,255,0.08);color:#aaa;">Annuler</button>
      </div>
    </div>
    <div id="pp-action"></div>
  </div>
</div>
<script>
// ============================================================
//  EMPIRE GALACTIQUE — client v1.3
//  Connecte au serveur : planete d'origine, colonisation, couleurs joueurs.
// ============================================================
let GRAINE=20260614, MON_PSEUDO=null, MON_HOME=null, MA_COULEUR='#9bd5d0', MON_JETON=null;
let POSSESSIONS={};   // addr -> {joueur, origine, nom_perso}
let COULEURS={};      // joueur -> couleur
let PROFILS_CACHE={}; // pseudo -> profil (couleur, embleme...)

// palette deterministe de couleurs par joueur (fallback si pas de couleur perso)
const PALETTE=['#9bd5d0','#ff9b7a','#9bb8ff','#ffd84a','#ff7ad8','#7ade9b','#d89bff','#ffb04a','#5bd5e0','#e0d05b'];
function couleurJoueur(nom){
  // priorite a la couleur personnalisee du profil si connue
  if(PROFILS_CACHE[nom]&&PROFILS_CACHE[nom].couleur) return PROFILS_CACHE[nom].couleur;
  if(COULEURS[nom]) return COULEURS[nom];
  let h=0; for(let i=0;i<nom.length;i++) h=(h*31+nom.charCodeAt(i))>>>0;
  const c=PALETTE[h%PALETTE.length]; COULEURS[nom]=c; return c;
}

const elConnexion=document.getElementById('connexion');
const elJeu=document.getElementById('jeu');
const elPseudo=document.getElementById('pseudo');
const elMdp=document.getElementById('motdepasse');
const elMsg=document.getElementById('msg');
let modeInscription=false;
document.getElementById('tab-connexion').addEventListener('click',()=>setMode(false));
document.getElementById('tab-inscription').addEventListener('click',()=>setMode(true));
function setMode(insc){ modeInscription=insc;
  document.getElementById('tab-connexion').classList.toggle('actif',!insc);
  document.getElementById('tab-inscription').classList.toggle('actif',insc);
  document.getElementById('entrer').textContent=insc?'Créer mon empire':'Entrer dans la galaxie';
  elMsg.textContent='';
}
document.getElementById('entrer').addEventListener('click',entrer);
elMdp.addEventListener('keydown',e=>{ if(e.key==='Enter') entrer(); });
elPseudo.addEventListener('keydown',e=>{ if(e.key==='Enter') elMdp.focus(); });

// reconnexion auto via jeton stocke
window.addEventListener('load',async()=>{
  const jeton=localStorage.getItem('eg_jeton');
  if(!jeton) return;
  try{ const r=await fetch('/api/session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jeton})});
    const d=await r.json();
    if(d.succes){ MON_JETON=jeton; await demarrerAvecSession(d); }
    else localStorage.removeItem('eg_jeton');
  }catch(e){}
});

let goHomeRequested=false;
async function entrer(){
  const pseudo=elPseudo.value.trim();
  const mdp=elMdp.value;
  if(pseudo.length<2){ elMsg.style.color='#ff9b7a'; elMsg.textContent="Pseudo : 2 caractères min."; return; }
  if(mdp.length<4){ elMsg.style.color='#ff9b7a'; elMsg.textContent="Mot de passe : 4 caractères min."; return; }
  elMsg.style.color='#8a97b5'; elMsg.textContent=modeInscription?"Création...":"Connexion...";
  const route=modeInscription?'/api/inscription':'/api/connexion';
  try{
    const r=await fetch(route,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pseudo,motdepasse:mdp})});
    const d=await r.json();
    if(d.erreur){ elMsg.style.color='#ff9b7a'; elMsg.textContent=d.erreur; return; }
    if(!d.succes){
      elMsg.style.color='#ff9b7a'; elMsg.textContent=d.message||"Échec.";
      if(d.inconnu){ elMsg.innerHTML=d.message+' <span style="color:#9bb8ff;cursor:pointer;text-decoration:underline;" onclick="document.getElementById(\'tab-inscription\').click()">Créer ce compte ?</span>'; }
      if(d.besoinMdp){ setMode(true); elMsg.style.color='#9bb8ff'; elMsg.textContent="Ce compte existe sans mot de passe — crée-en un pour le sécuriser."; }
      return;
    }
    MON_JETON=d.jeton; localStorage.setItem('eg_jeton',d.jeton);
    await demarrerAvecSession(d);
  }catch(e){ elMsg.style.color='#ff9b7a'; elMsg.textContent="Serveur injoignable. Réessaie."; }
}

async function demarrerAvecSession(d){
  if(d.graine) GRAINE=d.graine;
  MON_PSEUDO=d.pseudo;
  MON_HOME=d.home||null;
  // charger mon profil (couleur perso)
  await chargerProfil(MON_PSEUDO);
  MA_COULEUR=couleurJoueur(MON_PSEUDO);
  document.getElementById('moncom').textContent=MON_PSEUDO;
  document.getElementById('hud-col').style.background=MA_COULEUR;
  elConnexion.style.display='none'; elJeu.style.display='block';
  await chargerPossessions();
  await chargerStock();
  demarrerJeu();
  goHomeRequested=true;

// nom scientifique deterministe (IDENTIQUE au serveur galaxy.js)
function nomScientifique(addr){
  const m=/^S(\d+)-P(\d+)$/.exec(addr); if(!m) return addr;
  const sysIdx=parseInt(m[1],10), pIdx=parseInt(m[2],10);
  const lettres='bcdefghij'; const lettre=lettres[pIdx]||('p'+pIdx);
  const prefixes=['HD','GJ','HIP','TYC','Kepler','TOI','WASP','K'];
  let s=(100000+sysIdx+99)>>>0; s=(s*1664525+1013904223)>>>0; const prefixe=prefixes[Math.floor((s/4294967296)*prefixes.length)];
  const num=1000+(sysIdx%9000);
  return prefixe+'-'+num+' '+lettre;
}

async function chargerStock(){
  if(!MON_PSEUDO) return;
  try{ const r=await fetch('/api/stock?pseudo='+encodeURIComponent(MON_PSEUDO)); const d=await r.json();
    STOCK=d.stock||{}; PROD_H=d.productionHoraire||{}; stockTimestamp=Date.now();
  }catch(e){}
}
function majBandeauStock(){
  const el=document.getElementById('bandeau-stock'); if(!el) return;
  const keys=Object.keys(STOCK).filter(k=>STOCK[k]>0 || PROD_H[k]>0);
  if(keys.length===0){ el.innerHTML='<span class="res-empty">Aucune ressource — colonise une planète pour produire</span>'; return; }
  // tri par rareté décroissante puis quantité
  keys.sort((a,b)=>(RES_META[b]?.tier||0)-(RES_META[a]?.tier||0) || STOCK[b]-STOCK[a]);
  // interpolation : quantité affichée = stock + prod * temps écoulé
  const ecoule=(Date.now()-stockTimestamp)/3600000; // en heures
  let html='';
  for(const k of keys.slice(0,12)){ const m=RES_META[k]; if(!m) continue;
    const qte=(STOCK[k]||0)+(PROD_H[k]||0)*ecoule;
    const prodTxt=PROD_H[k]?'<span class="res-prod">+'+(PROD_H[k]).toFixed(PROD_H[k]<1?2:0)+'/h</span>':'';
    html+='<div class="res-item">'+elemPill(k,24)+'<span style="margin-left:5px;">'+Math.floor(qte).toLocaleString('fr-FR')+'</span>'+prodTxt+'</div>';
  }
  el.innerHTML=html;
}

  (function genGalaxy(){

      const ang=tt*7+arm*(6.28/arms)+(r()-0.5)*0.7; const dist=300+tt*GALAXY_R; const scatter=dist*0.16;

  function genResources(p){ const prof=PROFILS[p.type]||[]; const r=rng(p.seed+7777); const out=[];

    out.sort((a,b)=> b.tier-a.tier||b.d-a.d); return out; }

  function ensurePlanets(sys){

    const pr=rng(sys.seed); const pc=3+Math.floor(pr()*5); let maxA=0; sys.planets=[]; const prefix=sys.name.split('-')[0];
    for(let j=0;j<pc;j++){

      const pname=(pr()>0.65)?prefix+' '+PLANET_NAMES[Math.floor(pr()*PLANET_NAMES.length)]:prefix+' '+ROMAN[j];
      const a=46+j*48+pr()*16; maxA=Math.max(maxA,a); const size=def.sizeMin+pr()*(def.sizeMax-def.sizeMin);
      const p={name:pname,addr:sys.addr+'-P'+j,type,def,a,e:pr()*0.08,period:90+j*150+pr()*220,size,seed:sys.seed*10+j,angle:pr()*6.28,
        ring:def.gas&&pr()>0.45,moons:def.gas?(1+Math.floor(pr()*3)):(pr()>0.7?1:0),spinSpeed:(def.gas?2.2:1)*(0.7+pr()*0.8)};

  function makeParticles(seed,count,rIn,rOut,bp){ const rn=rng(seed); const a=[];

  const RING_BANK=makeParticles(99001,200,1.4,2.45,1400);

  const texCache={},texOrder=[];
  function getTex(p){ if(texCache[p.seed]) return texCache[p.seed];
    const R=48; const off=document.createElement('canvas'); off.width=R*2; off.height=R*2;
    const o=off.getContext('2d'); const r=rng(p.seed); const def=p.def;
    if(def.gas){ const bands=def.icy?['#8ec0e0','#a8d4ee','#76aad0','#bce0f0','#90c4e4','#a0d0ea']:['#c8a878','#a88858','#d8c098','#9a7848','#e0d0a8','#b89868'];
      for(let y=0;y<R*2;y++){ const bi=Math.floor((Math.sin(y*0.05+r()*0.3)*0.5+0.5)*bands.length); o.fillStyle=bands[Math.min(bands.length-1,bi)]; o.globalAlpha=0.9+r()*0.1; o.fillRect(0,y,R*2,1); }
      o.globalAlpha=1; if(!def.icy&&r()>0.4){ o.fillStyle='rgba(180,80,50,0.5)'; o.beginPath(); o.ellipse(R*0.7,R*1.2,18,11,0,0,6.28); o.fill(); }
    } else { o.fillStyle=def.water; o.fillRect(0,0,R*2,R*2); const blobs=14+Math.floor(r()*12);
      for(let i=0;i<blobs;i++){ const bx=r()*R*2,by=r()*R*2,br=5+r()*16; o.fillStyle=r()>0.6?def.high:def.land; o.globalAlpha=0.55+r()*0.4;
        o.beginPath(); o.arc(bx,by,br,0,6.28); o.fill(); o.beginPath(); o.arc(bx-R*2,by,br,0,6.28); o.fill(); o.beginPath(); o.arc(bx+R*2,by,br,0,6.28); o.fill(); }

        const g2=o.createLinearGradient(0,R*1.5,0,R*2); g2.addColorStop(0,'rgba(255,255,255,0)'); g2.addColorStop(1,def.polar); o.fillStyle=g2; o.fillRect(0,R*1.5,R*2,R*0.5); }
      if(p.type==='volcanique'){ for(let i=0;i<18;i++){ o.fillStyle='rgba(255,'+(100+r()*120|0)+',40,'+(0.4+r()*0.5).toFixed(2)+')'; o.beginPath(); o.arc(r()*R*2,r()*R*2,2+r()*3,0,6.28); o.fill(); } }

  const starTexCache={},starTexOrder=[];
  function getStarTex(sys){ if(starTexCache[sys.seed]) return starTexCache[sys.seed];
    const st=sys.star,R=40; const off=document.createElement('canvas'); off.width=R*2; off.height=R*2; const o=off.getContext('2d'); const r=rng(sys.seed+333);

  function solveKepler(M,e){ let E=M; for(let i=0;i<4;i++){ E=E-(E-e*Math.sin(E)-M)/(1-e*Math.cos(E)); } return E; }
  function planetLocal(p,t){ const M=p.angle+(2*Math.PI/p.period)*t; const E=solveKepler(M,p.e); const a=p.a,b=a*Math.sqrt(1-p.e*p.e); return {x:a*(Math.cos(E)-p.e),y:b*Math.sin(E)}; }
  function drawRingParticles(scr,t,al){ const fl=0.9; for(const a of RING_BANK){ const ang=a.a0+(2*Math.PI/a.period)*t; const rad=a.rad*scr;
    const px=Math.cos(ang)*rad,py=Math.sin(ang)*rad*fl; const tone=a.tone>0.5?'225,205,165':'190,170,135'; ctx.fillStyle='rgba('+tone+','+(a.bright*al*0.9).toFixed(2)+')'; ctx.beginPath(); ctx.arc(px,py,Math.max(0.4,a.size*scr*0.04),0,6.28); ctx.fill(); } }

  function drawDetailedPlanet(p,sx,sy,scr,sunSx,sunSy,t,al){

    const spin=(t*0.5*p.spinSpeed)%(scr*2);
    ctx.save(); ctx.beginPath(); ctx.arc(0,0,scr,0,6.28); ctx.clip();
    ctx.drawImage(tex.canvas,-scr-spin-1,-scr,scr*2+2,scr*2); ctx.drawImage(tex.canvas,-scr-spin+scr*2-1,-scr,scr*2+2,scr*2);
    const cxL=lx*scr,cyL=ly*scr; const lg=ctx.createRadialGradient(cxL,cyL,0,cxL,cyL,scr*2);
    lg.addColorStop(0,'rgba(255,255,255,0.18)'); lg.addColorStop(0.30,'rgba(255,255,255,0.04)'); lg.addColorStop(0.50,'rgba(0,0,0,0)');
    lg.addColorStop(0.62,'rgba(2,3,8,0.55)'); lg.addColorStop(0.74,'rgba(2,3,8,0.92)'); lg.addColorStop(1,'rgba(1,1,4,0.98)');
    ctx.fillStyle=lg; ctx.fillRect(-scr,-scr,scr*2,scr*2);

    ctx.restore();

    if(p.ring&&scr>3){ ctx.save(); ctx.beginPath(); ctx.rect(-scr*3,0,scr*6,scr*3); ctx.clip(); drawRingParticles(scr,t,al); ctx.restore(); }

    if(owner&&scr>2){ const c=couleurJoueur(owner.joueur); ctx.globalAlpha=al; ctx.strokeStyle=c; ctx.lineWidth=owner.origine?2.5:2;

  function drawStar(sp,sys,fA,fS,bs,t){
    const st=sys.star; const tw=1+Math.sin(t*2.5+sys.phase)*st.tw+Math.sin(t*6.1+sys.phase*1.7)*st.tw*0.4;
    const baseR=sys.starR*st.rFactor*bs; const starR=baseR*(1+fA*2.2); const haloR=starR*(2.2+fS*1.4)*st.lum*tw;
    const nameR=starR*(2.2+fS*1.4)*st.lum;  // rayon STABLE (sans tw) pour le nom
    const hg=ctx.createRadialGradient(sp.x,sp.y,starR*0.7,sp.x,sp.y,haloR); hg.addColorStop(0,'rgba('+st.halo+','+(0.35*tw).toFixed(2)+')'); hg.addColorStop(0.5,'rgba('+st.halo+',0.10)'); hg.addColorStop(1,'rgba('+st.halo+',0)');
    ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(sp.x,sp.y,haloR,0,6.28); ctx.fill();

      const ld=ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,starR); ld.addColorStop(0,'rgba(255,255,255,0.5)'); ld.addColorStop(0.6,'rgba(255,255,255,0)'); ld.addColorStop(0.88,'rgba(0,0,0,0.12)'); ld.addColorStop(1,'rgba(0,0,0,0.35)'); ctx.fillStyle=ld; ctx.fillRect(sp.x-starR,sp.y-starR,starR*2,starR*2); ctx.restore();

    return {starR,haloR,nameR};
  }

  // ---- PANNEAU MES PLANETES ----
  function mesPlanetes(){
    const out=[];
    for(const addr in POSSESSIONS){
      if(POSSESSIONS[addr].joueur===MON_PSEUDO){
        const m=/^S(\d+)-P(\d+)$/.exec(addr); if(!m) continue;
        const sysIdx=parseInt(m[1],10), pIdx=parseInt(m[2],10);
        const sys=SYS_BY_IDX[sysIdx]; if(!sys) continue;
        ensurePlanets(sys); const p=sys.planets[pIdx]; if(!p) continue;
        out.push({addr,p,sys,origine:POSSESSIONS[addr].origine});
      }
    }
    // monde d'origine en premier, puis par nom
    out.sort((a,b)=> (b.origine?1:0)-(a.origine?1:0) || nomAffiche(a.p).localeCompare(nomAffiche(b.p)));
    return out;
  }

    let vis=0; const showP=fS>0.01;
    for(let cx=cx0;cx<=cx1;cx++){ for(let cy=cy0;cy<=cy1;cy++){ const cell=grid.get(cellKey(cx,cy)); if(!cell) continue;
      for(const sys of cell){ const sp=w2s(sys.x,sys.y); const op=(sys.maxOrbit||300)*cam.zoom+120;
        if(sp.x<-op||sp.x>W+op||sp.y<-op||sp.y>H+op) continue; vis++; let si=null;
        if(showP){ ensurePlanets(sys);
          if(sys.hasBelt){ if(!sys._belt) sys._belt=makeParticles(sys.seed+555,120,sys.beltInner,sys.beltOuter,2600);
            for(const a of sys._belt){ const ang=a.a0+(2*Math.PI/a.period)*t; const wx=sys.x+Math.cos(ang)*a.rad,wy=sys.y+Math.sin(ang)*a.rad; const pp=w2s(wx,wy); if(pp.x<-20||pp.x>W+20||pp.y<-20||pp.y>H+20) continue; const c=a.tone>0.5?'200,190,170':'150,140,125'; ctx.fillStyle='rgba('+c+','+(a.bright*fS).toFixed(2)+')'; ctx.beginPath(); ctx.arc(pp.x,pp.y,Math.max(0.4,a.size*cam.zoom*0.5),0,6.28); ctx.fill(); } }
          if(fS>0.2){ for(const p of sys.planets){ const a=p.a*cam.zoom,b=a*Math.sqrt(1-p.e*p.e); const cxOrb=sp.x-p.a*p.e*cam.zoom; const dO=Math.abs(Math.hypot(mouse.x-cxOrb,mouse.y-sp.y)-a); const near=dO<14&&!mouse.dragged; ctx.beginPath(); ctx.ellipse(cxOrb,sp.y,a,b,0,0,6.28); ctx.strokeStyle='rgba(150,170,220,'+((near?0.3:0.1)*fS).toFixed(2)+')'; ctx.lineWidth=near?1.5:1; ctx.stroke(); } }
          si=drawStar(sp,sys,fA,fS,bs,t);
          const drawn=sys.planets.map(p=>{ const loc=planetLocal(p,t); return {p,px:sp.x+loc.x*cam.zoom,py:sp.y+loc.y*cam.zoom,scr:p.size*cam.zoom*0.5}; }).sort((a,b)=>a.py-b.py);
          for(const it of drawn){ if(it.scr>1.2) drawDetailedPlanet(it.p,it.px,it.py,it.scr,sp.x,sp.y,t,fS); else { ctx.globalAlpha=fS; ctx.fillStyle=it.p.def.water||'rgba('+(it.p.def.atmo||'150,150,150')+',1)'; ctx.beginPath(); ctx.arc(it.px,it.py,Math.max(1,it.scr),0,6.28); ctx.fill(); ctx.globalAlpha=1;
              const owner=POSSESSIONS[it.p.addr]; if(owner){ ctx.strokeStyle=couleurJoueur(owner.joueur); ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(it.px,it.py,Math.max(3,it.scr+2),0,6.28); ctx.stroke(); } }
            if(fS>0.4) candidates.push(it);
            if((fPN>0.05&&it.scr>2)||selectedPlanet===it.p){ const a=Math.max(fPN,selectedPlanet===it.p?1:0); ctx.fillStyle='rgba(210,225,255,'+(0.85*a).toFixed(2)+')'; ctx.font='11px sans-serif'; ctx.fillText(nomAffiche(it.p),it.px,it.py-it.scr-5); } }
        } else { si=drawStar(sp,sys,fA,fS,bs,t); }
        if(!mouse.dragged){ const hr=Math.max(12,si.haloR*0.5); if(Math.hypot(mouse.x-sp.x,mouse.y-sp.y)<hr) hoverSys=sys; }
        if((fA>0.15||hoverSys===sys)&&cam.zoom>LOD_APPROACH){ const a=Math.max(fA,hoverSys===sys?1:0); const yo=si.nameR+5+fS*8; ctx.fillStyle='rgba(255,255,255,'+(0.7*a).toFixed(2)+')'; ctx.font=(hoverSys===sys?'bold ':'')+'12px sans-serif'; ctx.fillText(sys.name,sp.x,sp.y-yo); }
      } } }
    const hov=planetAtCursor();
    if(hov&&!mouse.down){ ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(hov.px,hov.py,Math.max(10,hov.scr+7),0,6.28); ctx.stroke(); canvas.style.cursor='pointer'; }
    else if(hoverSys&&!mouse.down){ const sp=w2s(hoverSys.x,hoverSys.y); ctx.strokeStyle='rgba(120,180,255,0.6)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(sp.x,sp.y,Math.max(14,hoverSys.starR*hoverSys.star.rFactor*bs*2.6),0,6.28); ctx.stroke(); canvas.style.cursor='pointer'; }
    else if(!mouse.down){ canvas.style.cursor='grab'; }
    if(cam.zoom>=LOD_SYSTEM){ scaleBadge.textContent='Système'+(hoverSys?' '+hoverSys.name:''); } else if(cam.zoom>=LOD_APPROACH){ scaleBadge.textContent='Approche'; } else { scaleBadge.textContent='Galaxie'; }
    frameCount++; if(now-fpsT>500){ fps=Math.round(frameCount*1000/(now-fpsT)); frameCount=0; fpsT=now; }
    perfBadge.textContent=vis+' systèmes · '+fps+' fps';
    if(hov){ info.style.opacity='1'; const ow=POSSESSIONS[hov.p.addr]; info.innerHTML='<strong>'+hov.p.name+'</strong> · '+hov.p.def.label+(ow?' · <span style="color:'+couleurJoueur(ow.joueur)+'">'+ow.joueur+'</span>':'')+' — clic'; }
    else if(hoverSys){ info.style.opacity='1'; info.innerHTML='<strong>'+hoverSys.name+'</strong> · <span style="color:'+hoverSys.star.core+'">'+hoverSys.star.label+'</span>'; }
    else { info.style.opacity='0'; }
    requestAnimationFrame(draw);
  }
  resize(); requestAnimationFrame(draw);
}
</script>
